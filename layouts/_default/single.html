{{ define "main" }}
  <article class="mx-auto max-w-4xl px-4 py-12 sm:px-6 md:px-8 md:py-20">
    <header>
      <h1 class="text-3xl font-semibold tracking-tight sm:text-4xl">{{ .Title }}</h1>
      {{ with .Params.github_url }}
        <div class="mt-4">
          <a href="{{ . }}" class="inline-flex items-center gap-2 rounded-full border border-line px-4 py-2 text-sm font-medium text-muted transition hover:border-ink hover:text-ink" aria-label="View {{ $.Title }} on GitHub">
            {{ partial "github-icon.html" (dict "class" "h-4 w-4") }}
            <span>GitHub</span>
          </a>
        </div>
      {{ end }}
    </header>
    <section class="prose mt-8 max-w-none">
      {{ .Content }}
    </section>
  </article>
{{ end }}
